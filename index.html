<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報メール生成</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    background: #f5f4f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
  .card {
    background: #fff;
    border: 0.5px solid #ddd;
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card-label {
    font-size: 13px;
    color: #666;
    display: block;
    margin-bottom: 8px;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 8px 12px;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: #888; }
  textarea { resize: vertical; line-height: 1.6; }
  .tasks-header {
    display: grid;
    grid-template-columns: minmax(0,1fr) 90px 32px;
    gap: 8px;
    margin-bottom: 4px;
  }
  .tasks-header span { font-size: 12px; color: #aaa; }
  .task-row {
    display: grid;
    grid-template-columns: minmax(0,1fr) 90px 32px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .time-input { text-align: center; }
  button {
    cursor: pointer;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    font-size: 13px;
    font-family: inherit;
    padding: 6px 14px;
    transition: background 0.1s;
  }
  button:hover { background: #f0f0f0; }
  button:active { transform: scale(0.98); }
  .del-btn {
    width: 32px; height: 36px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    color: #aaa; flex-shrink: 0;
  }
  .del-btn:hover { color: #c0392b; background: #fef0f0; border-color: #f0c0c0; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .chip-label { font-size: 12px; color: #999; margin-bottom: 6px; margin-top: 4px; display: block; }
  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    border: 0.5px solid #ccc;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: all 0.1s;
  }
  .chip:hover { border-color: #888; color: #1a1a1a; }
  .chip.selected { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .impression-preview {
    margin-top: 10px;
    padding: 8px 12px;
    background: #f5f4f0;
    border-radius: 8px;
    font-size: 13px;
    color: #555;
    min-height: 36px;
    line-height: 1.6;
  }
  .generate-btn {
    width: 100%; padding: 11px;
    font-size: 14px; font-weight: 500;
    background: #1a1a1a; color: #fff;
    border: none; border-radius: 8px;
    margin-top: 0.5rem;
  }
  .generate-btn:hover { background: #333; }
  .result-area { display: none; margin-top: 1.5rem; }
  .result-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 8px;
  }
  .result-header span { font-size: 13px; color: #666; }
  .subject-line {
    font-size: 13px; color: #555;
    padding: 6px 10px; background: #f5f4f0;
    border-radius: 8px; border: 0.5px solid #ddd;
    margin-bottom: 8px;
  }
  .result-text {
    white-space: pre-wrap; font-size: 14px; line-height: 1.8;
    padding: 16px; background: #fff;
    border: 0.5px solid #ddd; border-radius: 8px;
    color: #1a1a1a; min-height: 160px;
  }
  .error-area {
    display: none; margin-top: 1rem; font-size: 13px;
    color: #c0392b; padding: 8px 12px;
    background: #fef0f0; border-radius: 8px;
    border: 0.5px solid #f0c0c0;
  }
  .copied { color: #27ae60 !important; }
  .add-btn { font-size: 13px; margin-top: 4px; }
  .divider { border: none; border-top: 0.5px solid #eee; margin: 8px 0 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>日報メール生成</h1>

  <div class="card">
    <span class="card-label">取り組んだこと</span>
    <div class="tasks-header">
      <span>内容</span>
      <span style="text-align:center;">時間（例：1h）</span>
      <span></span>
    </div>
    <div id="task-rows"></div>
    <button class="add-btn" onclick="addRow()">＋ 行を追加</button>
  </div>

  <div class="card">
    <span class="card-label">感想・気づき</span>

    <span class="chip-label">進捗</span>
    <div class="chip-group">
      <button class="chip" data-group="progress" data-text="本日の業務は概ね計画通りに進みました。">計画通りに進んだ</button>
      <button class="chip" data-group="progress" data-text="一部の作業が想定より時間を要しました。">想定より時間がかかった</button>
      <button class="chip" data-group="progress" data-text="予定より前倒しで完了できました。">前倒しで完了した</button>
      <button class="chip" data-group="progress" data-text="作業が途中となり、明日に持ち越しとなります。">明日に持ち越し</button>
    </div>

    <hr class="divider">
    <span class="chip-label">学習・インプット</span>
    <div class="chip-group">
      <button class="chip" data-group="insight" data-text="新しい概念や技術への理解が深まりました。">理解が深まった</button>
      <button class="chip" data-group="insight" data-text="学習内容の中に難しい箇所があり、引き続き理解を深めていきます。">難しい箇所があった</button>
      <button class="chip" data-group="insight" data-text="学習内容と実務のつながりが見えてきました。">実務との接点が見えた</button>
      <button class="chip" data-group="insight" data-text="ハンズオンを通じて実際の操作感をつかめました。">手を動かして理解が進んだ</button>
      <button class="chip" data-group="insight" data-text="想定より内容のボリュームがあり、丁寧に進めています。">ボリュームが多かった</button>
      <button class="chip" data-group="insight" data-text="学習内容を整理・復習し、定着を図りました。">復習・整理ができた</button>
    </div>

    <hr class="divider">
    <span class="chip-label">オンボーディング・環境</span>
    <div class="chip-group">
      <button class="chip" data-group="onboard" data-text="業務の全体像が少しずつ見えてきました。">全体像が見えてきた</button>
      <button class="chip" data-group="onboard" data-text="確認すべき点や不明点が明確になりました。">不明点が明確になった</button>
      <button class="chip" data-group="onboard" data-text="関係者とのコミュニケーションを通じて理解が進みました。">関係者から学べた</button>
      <button class="chip" data-group="onboard" data-text="環境構築・ツール設定を進め、作業基盤が整いつつあります。">環境整備が進んだ</button>
      <button class="chip" data-group="onboard" data-text="新しい職場のやり方や文化への理解が深まっています。">職場の文化を理解できた</button>
    </div>

    <hr class="divider">
    <span class="chip-label">翌日の予定</span>
    <div class="chip-group">
      <button class="chip" data-group="tomorrow" data-text="明日は本日の続きの学習を進める予定です。">引き続き同じ学習</button>
      <button class="chip" data-group="tomorrow" data-text="明日は関係者への確認・共有を行う予定です。">確認・共有が必要</button>
      <button class="chip" data-group="tomorrow" data-text="明日中に学習を完了させる予定です。">明日完了見込み</button>
      <button class="chip" data-group="tomorrow" data-text="明日は次のテーマに進む予定です。">次のテーマへ進む</button>
      <button class="chip" data-group="tomorrow" data-text="明日は復習・アウトプットの時間を設ける予定です。">復習・アウトプット予定</button>
    </div>

    <hr class="divider">
    <span class="chip-label">明日の勤務予定</span>
    <div class="chip-group">
      <button class="chip" data-group="workstyle" data-text="なお、明日は新宿オフィスへ出社予定です。">新宿出社</button>
      <button class="chip" data-group="workstyle" data-text="なお、明日は在宅勤務の予定です。">在宅勤務</button>
    </div>

    <div class="impression-preview" id="impressionPreview">選択すると文章が表示されます</div>
  </div>

  <button class="generate-btn" onclick="generate()">メール文面を生成する</button>
  <div class="error-area" id="errorArea"></div>

  <div class="result-area" id="resultArea">
    <div class="result-header">
      <span>生成されたメール</span>
      <button id="copyBtn" onclick="copyText()">コピー</button>
    </div>
    <div class="subject-line" id="subjectLine"></div>
    <div class="result-text" id="resultText"></div>
  </div>
</div>

<script>
let rowCount = 0;
// 各グループの選択テキストを配列で管理（複数選択対応）
const selected = { progress: [], insight: [], onboard: [], tomorrow: [], workstyle: [] };

function addRow(content, time) {
  rowCount++;
  const id = rowCount;
  const container = document.getElementById('task-rows');
  const row = document.createElement('div');
  row.className = 'task-row';
  row.id = 'row-' + id;
  row.innerHTML =
    '<input type="text" placeholder="例：Udemy（SQL入門 セクション3）" value="' + (content||'') + '" class="task-content">' +
    '<input type="text" placeholder="1h" value="' + (time||'') + '" class="time-input">' +
    '<button class="del-btn" onclick="removeRow(' + id + ')" title="削除">✕</button>';
  container.appendChild(row);
}

function removeRow(id) {
  const el = document.getElementById('row-' + id);
  if (el) el.remove();
}

function getTasks() {
  const tasks = [];
  document.querySelectorAll('.task-row').forEach(row => {
    const content = row.querySelector('.task-content').value.trim();
    const time = row.querySelector('.time-input').value.trim();
    if (content) tasks.push({ content, time });
  });
  return tasks;
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const group = chip.dataset.group;
    const text = chip.dataset.text;
    const idx = selected[group].indexOf(text);
    if (idx >= 0) {
      selected[group].splice(idx, 1);
      chip.classList.remove('selected');
    } else {
      selected[group].push(text);
      chip.classList.add('selected');
    }
    updatePreview();
  });
});

function getAllSelected() {
  return [
    ...selected.progress,
    ...selected.insight,
    ...selected.onboard,
    ...selected.tomorrow,
    ...selected.workstyle
  ];
}

function buildImpressionText(allSelected) {
  if (allSelected.length === 0) return '';
  // グループ順に段落を組み立てる
  const groupOrder = ['progress', 'insight', 'onboard', 'tomorrow', 'workstyle'];
  const connectors = ['また、', 'さらに、', 'そして、'];
  const paragraphs = [];
  groupOrder.forEach(group => {
    const items = selected[group];
    if (items.length === 0) return;
    let connectorIndex = 0;
    let para = items[0].replace(/。$/, '');
    for (let i = 1; i < items.length; i++) {
      const connector = connectors[connectorIndex % connectors.length];
      connectorIndex++;
      para += '。' + connector + items[i].replace(/。$/, '');
    }
    paragraphs.push(para + '。');
  });
  return paragraphs.join('\n');
}

function updatePreview() {
  const parts = getAllSelected();
  const preview = document.getElementById('impressionPreview');
  preview.textContent = parts.length > 0 ? buildImpressionText(parts) : '選択すると文章が表示されます';
}

function getImpressionText() {
  return buildImpressionText(getAllSelected());
}

function generate() {
  const tasks = getTasks();
  if (tasks.length === 0) { showError('取り組んだことを1件以上入力してください。'); return; }
  document.getElementById('errorArea').style.display = 'none';

  const today = new Date();
  const dateStr = today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日';
  const taskLines = tasks.map(t => t.time ? '・' + t.content + '（' + t.time + '）' : '・' + t.content).join('\n');
  const impression = getImpressionText();

  const subject = '【日報】' + dateStr;
  let body = 'お疲れ様です。本日の報告をいたします。\n\n';
  body += '■ 本日の取り組み\n' + taskLines + '\n\n';
  if (impression) {
    body += '■ 所感・気づき\n' + impression + '\n\n';
  }
  body += '以上、よろしくお願いいたします。';

  document.getElementById('subjectLine').textContent = '件名：' + subject;
  document.getElementById('resultText').textContent = body;
  document.getElementById('resultArea').style.display = 'block';
}

function copyText() {
  const subject = document.getElementById('subjectLine').textContent;
  const body = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(subject + '\n\n' + body).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

function showError(msg) {
  const el = document.getElementById('errorArea');
  el.textContent = msg;
  el.style.display = 'block';
}

addRow(); addRow(); addRow();
</script>
</body>
</html>
